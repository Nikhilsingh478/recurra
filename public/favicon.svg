<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="geometricPrecision">

  <!-- Background — deep navy -->
  <rect width="64" height="64" rx="14" fill="#060d1a"/>

  <!-- Outer arc — 270°, gap opens at bottom-right, electric blue -->
  <path
    d="M 52 32 A 20 20 0 1 0 39.14 50.14"
    fill="none"
    stroke="#4a7fd4"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- Inner arc — 270°, gap opens at top-left, pale sky blue -->
  <path
    d="M 32 19 A 13 13 0 1 1 19.81 38.5"
    fill="none"
    stroke="#8cb8f0"
    stroke-width="4"
    stroke-linecap="round"
    opacity="0.65"
  />

  <!-- Center anchor dot -->
  <circle cx="32" cy="32" r="3.5" fill="#4a7fd4"/>

</svg>